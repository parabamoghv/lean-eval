name = "formal-math-eval"
defaultTargets = ["FormalMathEval"]

[leanOptions]
autoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0-rc1"

[[require]]
name = "Cli"
git = "https://github.com/leanprover/lean4-cli"
rev = "v4.30.0-rc1"

[[require]]
name = "subverso"
git = "https://github.com/leanprover/subverso"
rev = "main"

[[lean_lib]]
name = "FormalMathEval"

[[lean_lib]]
name = "EvalTools"

[[lean_exe]]
name = "extract_theorem"
root = "EvalTools.ExtractTheorem"

[[lean_exe]]
name = "eval_inventory"
root = "EvalTools.ProblemInventory"

[[lean_exe]]
name = "lean-eval"
root = "EvalTools.Main"
