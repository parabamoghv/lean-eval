id = "families_of_maps_b01"
title = "MorrisonвҖ“Walker Lemma B.0.1: adapting families of maps to open covers"
test = false
module = "LeanEval.Topology.FamiliesOfMapsB01"
holes = ["FamiliesOfMapsB01.continuous", "FamiliesOfMapsB01.biLipschitz"]
submitter = "Kim Morrison"
notes = "Lemma B.0.1 of MorrisonвҖ“Walker, *The Blob Complex* (arXiv:1009.5025, Appendix B, pp. 93вҖ“96). Two holes that must both be filled: `FamiliesOfMapsB01.continuous` is the continuous case (clauses 1вҖ“3); `FamiliesOfMapsB01.biLipschitz` is the bi-Lipschitz variant of clause 4. Given a continuous family `f : P Г— X вҶ’ T` parametrised by a convex linear polyhedron `P вҠҶ в„қбөҸ` and a partition of unity subordinate to an open cover `U` of a compact space `X`, produce a continuous homotopy `F : I Г— P Г— X вҶ’ T` from `f` to a family adapted to `U` on each closed cell of a polyhedral subdivision of `P`, with support preserved on `I Г— P` and along boundary subpolyhedra `I Г— Q вҠҶ I Г— вҲӮP`. The polyhedral-subdivision conclusion (rather than a loose closed cover) is what makes Lemma B.0.2 (the chain-level deformation retract) a chain-complex consequence: each closed cell is a generator of CвҲ—(Maps(X вҶ’ T)) and adjacent cells share (kвҲ’1)-faces with cancelling orientations. The bi-Lipschitz variant bundles each slice as a homeomorphism `slice p : X вүғвӮң T` (capturing surjectivity), imposes the paper's joint Lipschitz hypothesis ('f is Lipschitz in the P direction as well') via `LipschitzWith L f.toFun`, and concludes the same bundled bi-Lipschitz homeomorphism structure for every slice `F (t, p, В·)`. The smooth-diffeomorphism / immersion / PL variants are not stated. The paper explicitly does *not* prove the analogous statement for plain continuous homeomorphisms (cf. remark at the end of Appendix B; only EdwardsвҖ“Kirby's 1-parameter version is known). Supporting definitions `Supported`, `AdaptedTo`, `IsPolyhedron`, `Subdivision`, `closedCell`, `IsBoundarySubpolyhedron` are trusted infrastructure rather than holes вҖ” the multi-hole pipeline factors them into `ChallengeDeps.lean`. Mathlib has `Geometry.SimplicialComplex`, `PartitionOfUnity`, `intrinsicFrontier`, `ContinuousMap`, `LipschitzWith`, etc. вҖ” what is missing is the polyhedral-subdivision API and the lemma itself."
source = "S. Morrison and K. Walker, *The Blob Complex*, arXiv:1009.5025, Appendix B, Lemma B.0.1 (pp. 93вҖ“96): https://arxiv.org/pdf/1009.5025"
informal_solution = "Choose for each cover index Оұ a cell decomposition KОұ of P in general position with respect to each other, with a common refinement L. For each top k-cell C of each KОұ, pick a point p(C, Оұ) вҲҲ C (along boundaries when C meets вҲӮP). On each k-handle D of LМғ define u(t, p, x) := (1вҲ’t) p + t ОЈОұ rОұ(x) p(D, Оұ), and extend u inductively over lower-dimensional handles of LМғ via the product structure of each (kвҲ’j)-handle E вүғ B^{kвҲ’j} Г— B^j using auxiliary functions О·ОІвҒұ : B^j вҶ’ [0, 1] that form a partition of unity in the normal direction (formula (B.1) in the paper). Set F(t, p, x) := f(u(t, p, x), x). Then F is continuous, F(0, В·, В·) = f, F(1, В·, В·) restricted to a top handle D of LМғ depends on x only through the at-most-k partition functions rОұ that vary across D's chosen points (so each handle is adapted), and F preserves the support of f on I Г— P and on I Г— Q for any subpolyhedral Q вҠҶ вҲӮP (because u maps I Г— Q Г— X into Q). For the bi-Lipschitz variant: the same construction works. The slice regularity follows from the chain rule вҲӮF/вҲӮx = вҲӮf/вҲӮx + (вҲӮf/вҲӮp)(вҲӮu/вҲӮx), where вҲӮf/вҲӮx is bi-Lipschitz with constant L uniformly in p (compactness of P), вҲӮf/вҲӮp is bounded by the joint Lipschitz constant L, and вҲӮu/вҲӮx is made small by choosing the KОұ sufficiently fine вҖ” so F(t, p, В·) is bi-Lipschitz with a constant L' close to L."
