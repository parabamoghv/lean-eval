id = "bezout_projective_multiplicity"
title = "Bézout's theorem (projective, with multiplicity)"
test = false
module = "LeanEval.AlgebraicGeometry.Bezout"
holes = ["bezout_multiplicity"]
submitter = "Kim Morrison"
notes = "§50 of Knill's 'Some Fundamental Theorems in Mathematics' (with-multiplicity reading). For n homogeneous polynomials f_k of total degrees d_k ≥ 1 in n+1 variables over an algebraically closed field with finite common projective zero set, ∑ᶠ p ∈ ⋂ V(f_k), intersectionMultiplicity f p = ∏ d_k (equation in ℕ∞). The intersection multiplicity is defined on an affine chart: pick a nonzero coordinate i of p.rep, normalize that coordinate to 1, localize the affine coordinate ring K[X_0, …, X_n] at the maximal ideal of the resulting point, and take Module.length K of the quotient by (f_1, …, f_n, X_i − 1). This is the standard affine-chart/local-length formulation of projective intersection multiplicity. The Lean file ships helper definitions (chartIndex, affineConeCoord, maxIdealAt, localRingAt, intersectionMultiplicity) and the theorem hole. Mathlib has Projectivization, MvPolynomial.IsHomogeneous, Module.length, Localization.AtPrime, IsLocalization.AtPrime.isLocalRing, and IsAlgClosed.card_roots_eq_natDegree (the n = 1 base case), but no projective Bézout theorem or projective intersection-multiplicity API. Two hypotheses worth highlighting: (a) totalDegree = d k forces d k to be the actual degree (IsHomogeneous d alone is satisfied by the zero polynomial for any d, so the totalDegree clause rules that out); (b) Module.length (codomain ℕ∞) returns ⊤ on positive-dimensional components, so the equation is honest about non-proper intersections."
source = "É. Bézout, *Théorie générale des équations algébriques*, Paris, 1779. Listed as §50 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Wiedijk-100 #60 'Bézout's Theorem' refers to the integer gcd identity in HOL Light / Isabelle / Lean / Agda-unimath, not the projective intersection statement, which I did not find in any major prover. No open mathlib PR for 'bezout' as of 2026-05-27."
informal_solution = "Classical proof via Hilbert series: for each k ≥ 1 the graded piece (K[X_0, …, X_n] / (f_1, …, f_k))_d has Hilbert polynomial of degree n − k and leading coefficient d_1 ⋯ d_k / (n − k)!. After cutting by all n forms the algebra is Artinian and the length of its degree-d piece equals ∏ d_k for d ≫ 0 (Macaulay 1916); local-Hilbert-series decomposition then redistributes this as a sum of local multiplicities at the finitely many intersection points. Alternative deformation proof: degenerate the f_k to f̃_k = ∏_j (X_{k+1} − α_{k,j} · X_0) for distinct α_{k,j} ∈ K; the deformed intersection has exactly ∏ d_k transverse points (multiplicity 1 each) by linear algebra; continuity of the Hilbert function under flat families shows ∑ imult does not change along the deformation."
