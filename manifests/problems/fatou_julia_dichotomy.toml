id = "fatou_julia_dichotomy"
title = "Fatou–Julia / Cantor dichotomy for the quadratic family"
test = false
module = "LeanEval.ComplexAnalysis.FatouJulia"
holes = ["julia_cantor_dichotomy"]
submitter = "Kim Morrison"
notes = "§62 (additional statement 1) of Knill's 'Some Fundamental Theorems in Mathematics'. For T_c(z) = z² + c, the filled Julia set K_c = { z | T_c^n(z) stays bounded } is connected iff c is in the Mandelbrot set, and homeomorphic to the Cantor space ℕ → Bool otherwise. The file ships Tc, Mandelbrot, and FilledJulia definitions. Knill calls K_c the 'Julia set'; standard usage reserves that for ∂K_c. The dichotomy holds for either reading. Mathlib has Function.iterate, IsConnected, Homeomorph, and Mathlib.Topology.Instances.CantorSet (with cantorSetHomeomorphNatToBool), but no Julia or Mandelbrot definitions and no Fatou–Julia dichotomy. The connected case follows from the lemniscate-preimage construction (T_c^{-n} of the bounding disc is a nested family of compact connected sets, intersection K_c); the Cantor case combines perfectness, total disconnectedness for c ∉ M, and Brouwer's 1910 characterisation of Cantor space. Aristotle audits closed 12 supporting lemmas (Part 1 entirely sorry-free) but left the deep Cantor-side gaps."
source = "P. Fatou, *Sur les équations fonctionnelles* (1919-20); G. Julia, *Mémoire sur l'itération des fonctions rationnelles*, Journal de Math. (1918). Modern statement: Douady–Hubbard *Étude dynamique* I, II (1984-85). Listed as §62 (additional 1) in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). I did not find a Lean formalisation."
informal_solution = "Connected case (c ∈ M): the basin of ∞ for T_c is a connected open set (the preimage tower T_c^{-n}(ℂ \\ closedBall 0 R) for large R is a decreasing sequence of connected open sets), so K_c = ℂ \\ (basin of ∞) is the complement of a simply connected open set on the Riemann sphere, hence connected (Alexander duality on S²). Cantor case (c ∉ M): the orbit of the critical point 0 escapes to ∞; K_c misses an open disc through the critical orbit; T_c restricted to K_c is conjugate to the one-sided shift on { 0, 1 }^ℕ via the 2-branched preimages of the bounding circle. Verify K_c is compact, perfect, totally disconnected; Brouwer's 1910 theorem gives the Cantor-space homeomorphism."
