id = "kolmogorov_arnold_superposition"
title = "Kolmogorov–Arnold superposition theorem"
test = false
module = "LeanEval.Analysis.KolmogorovArnold"
holes = ["kolmogorov_arnold"]
submitter = "Kim Morrison"
notes = "§80 of Knill's 'Some Fundamental Theorems in Mathematics' (main theorem). For n ≥ 1, every continuous f on the unit cube [0,1]ⁿ admits the Lorentz-form representation f(x) = ∑_{k=0}^{2n} g(∑_{l=1}^{n} φ_{k,l}(x_l)) with a single continuous outer g : ℝ → ℝ and continuous inner φ_{k,l} : ℝ → ℝ, exhibiting f as a finite superposition of continuous one-variable functions and addition. This resolves the continuous form of Hilbert's 13th problem. The classical theorem is on the compact cube [0,1]ⁿ; encoded here on Set.Icc (0 : Fin n → ℝ) 1 with inner/outer functions continuous on all of ℝ (equivalent via Tietze). Both g and the φ_{k,l} may depend on f — the existence form, slightly weaker than Kolmogorov's universal-inner-functions refinement, but exactly Knill's statement. Mathlib has ContinuousOn and finite Finset.sum (enough to state the representation), but no Kolmogorov–Arnold theorem; the only Kolmogorov hits in mathlib are the probabilistic extension and zero-one theorems (unrelated). No in-flight mathlib PR, no dedicated external Lean project."
source = "A. N. Kolmogorov, *On the representation of continuous functions of several variables by superposition of continuous functions of one variable and addition*, Doklady Akad. Nauk SSSR 114 (1957), 953-956. V. I. Arnold, *On functions of three variables*, Doklady Akad. Nauk SSSR 114 (1957), 679-681. G. G. Lorentz, *Metric entropy, widths, and superpositions of functions*, Amer. Math. Monthly 69 (1962), 469-485 (Lorentz refinement to a single outer function). Listed as §80 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Not on Wiedijk 100; I did not find a Lean formalisation."
informal_solution = "Standard Kolmogorov construction: pick rationally-independent positive reals λ_1, …, λ_n. Define inner functions φ_{k,l}(t) = ψ_k(t) for monotone Lipschitz step-approximating functions ψ_0, …, ψ_{2n} that separate cells of a nested system of partitions of [0,1] ⊂ ℝ. The inner sum y_k(x) = ∑_l λ_l · ψ_k(x_l) distinguishes nearby points of the cube in at least one of the 2n+1 indices k. The outer function g is constructed iteratively: at each stage, g approximates the residual of f minus the current partial sum, using uniform continuity of f on the compact cube; the rational independence of the λ_l guarantees a single g can simultaneously serve all 2n+1 layers. The Lorentz refinement combines (using a clever change of inner function) the n outer functions of Kolmogorov's original argument into one."
