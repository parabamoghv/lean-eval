id = "poincare_bendixson"
title = "Poincaré–Bendixson theorem"
test = false
module = "LeanEval.Dynamics.PoincareBendixson"
holes = ["poincare_bendixson"]
submitter = "Kim Morrison"
notes = "§63 of Knill's 'Some Fundamental Theorems in Mathematics'. Sharp planar trichotomy: for a C¹ autonomous vector field F : ℝ² → ℝ² and a global integral curve γ, the forward orbit is unbounded; or its ω-limit set ⋂ s, closure (γ '' Ici s) contains an equilibrium of F; or its ω-limit set equals the range of a non-constant periodic integral curve. The case-2 'contains an equilibrium' weakening (instead of pointwise convergence to one) admits polycycles / heteroclinic cycles — necessary because the polynomial field F₀(x, y) = (−(x²+y²−1)²·(y + x·(x²+y²−1)), (x²+y²−1)²·(x − y·(x²+y²−1))) has bounded orbits spiraling toward the unit circle of equilibria without converging to any single point. Case 3 requires F (β 0) ≠ 0 to exclude vacuous satisfaction by constant equilibria. Mathlib has IsIntegralCurve, omegaLimit / ω⁺, Flow, and Picard–Lindelöf, but no Poincaré–Bendixson theorem, no Jordan curve theorem in ℝ² (a hard dependency for the classical proof; the same gap is §48 of Knill), no transverse-arc / first-return-map machinery, and no global continuation of C¹ ODE flows. The Isabelle/HOL/AFP 'Poincare-Bendixson' entry (Immler–Tan) exists and uses Harrison's Jordan curve theorem; no Lean port."
source = "H. Poincaré, *Mémoire sur les courbes définies par une équation différentielle*, Journal de Mathématiques 7 (1881), 8 (1882), 1 (1885), 2 (1886); I. Bendixson, *Sur les courbes définies par des équations différentielles*, Acta Mathematica 24 (1901), 1-88. Listed as §63 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). No formalization found in mathlib4 or any open mathlib PR. The Isabelle/HOL/AFP entry by Fabian Immler and Yong Kiam Tan (https://www.isa-afp.org/entries/Poincare_Bendixson.html) depends on John Harrison's Jordan curve theorem."
informal_solution = "Classical proof: assume the forward orbit is bounded and the ω-limit set contains no equilibrium of F. Pick a regular point p of the ω-limit set and a transverse arc Σ at p. The first-return map P : Σ → Σ along the flow is well-defined and monotone in the natural linear order on Σ. The orbit's intersections with Σ form a monotone sequence converging to p; combined with the Jordan curve theorem (a closed orbit Γ separates ℝ² into bounded interior and unbounded exterior, and trajectories cannot escape across Γ), this forces the ω-limit set to be exactly the range of a periodic integral curve through p. The non-degeneracy F (β 0) ≠ 0 follows from p being a regular point. The three missing prerequisites in mathlib — Jordan curve theorem, transverse-arc / first-return-map analysis, and global ODE continuation — are each substantial developments in their own right."
