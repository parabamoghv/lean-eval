id = "isoperimetric_inequality"
title = "Isoperimetric inequality (Knill formulation)"
test = false
module = "LeanEval.Geometry.IsoperimetricInequality"
holes = ["isoperimetric"]
submitter = "Kim Morrison"
notes = "§71 of Knill's 'Some Fundamental Theorems in Mathematics'. For any measurable bounded B ⊆ ℝⁿ with n ≥ 2, n^n · volume(B)^{n−1} · volume(closedBall 0 1) ≤ μHE[n−1](frontier B)^n, where μHE[n−1] is the (n−1)-dimensional Euclidean Hausdorff measure on the topological frontier. For a smooth bounded domain with smooth bounding hypersurface S = frontier B, μHE[n−1] (frontier B) agrees with the classical surface area, so the statement specialises to Knill's smooth-surface form. The Hausdorff-measure-of-topological-frontier formulation is mathematically weaker than the standard De Giorgi perimeter / reduced boundary version (topological frontier can be larger than the measure-theoretic boundary), but it is well-defined for any measurable bounded set and the inequality is true there. The 2 ≤ n hypothesis matches Knill's smooth-surface-homeomorphic-to-a-sphere setup; the n = 1 case is excluded because this ENNReal formulation fails for B = ∅. Mathlib has μHE[d], EuclideanSpace.volume_ball / volume_closedBall, and frontier, but no isoperimetric inequality, no Brunn–Minkowski, no perimeter / De Giorgi perimeter, no Minkowski content; Wiedijk-100 'The Isoperimetric Theorem' has no decl in docs/100.yaml. No open mathlib PR for 'isoperimetric' or 'Brunn-Minkowski' as of 2026-05-27. mirajcs/IsoperimetricInequality (2026) proves the planar n = 2 fragment L² ≥ 4πA via Fourier methods; it does not extend to the n-dimensional formulation."
source = "Classical (Greek geometry); n-dimensional form: De Giorgi (1958), Federer (1969). Listed as §71 in O. Knill, *Some Fundamental Theorems in Mathematics* (https://people.math.harvard.edu/~knill/graphgeometry/papers/fundamental.pdf). Wiedijk-100 entry #14 with no decl. HOL Light has the n-dimensional version (J. Harrison); Mizar has the planar form; Lean has only the n = 2 planar fragment (mirajcs/IsoperimetricInequality, 2026)."
informal_solution = "Standard proof via Brunn–Minkowski and Steiner symmetrization. (1) Steiner-symmetrize B over n hyperplanes — each step preserves volume and decreases surface area, converging to a ball B* of the same volume. (2) For the ball, equality holds: n · vol(B*) = vol(unit ball) · radius^n and surface area = n · vol(unit ball) · radius^{n−1}, so n^n · vol(B*)^{n−1} · vol(B₁) = (surface area)^n. (3) For general B, lower-semicontinuity of the (n−1)-Hausdorff measure of the frontier under Steiner symmetrization gives the inequality. Alternative routes: optimal transport (Brenier / Knothe), Sobolev W^{1,1} → L^{n/(n−1)} via Federer–Fleming with co-area, or Gromov's proof. Each requires substantial measure-theoretic infrastructure absent from mathlib."
