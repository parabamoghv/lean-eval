name: Submit benchmark solution
description: Submit a Lean proof for one or more lean-eval benchmark problems.
title: "[submission] "
labels:
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Submit a Lean proof for one or more lean-eval benchmark problems.

        You can submit anything that contains at least one `lakefile.toml`
        whose `name` field matches a benchmark problem id. The CI walks the
        content you point at and tries every match it finds. That means all of
        these work:

        - a repo that is a single generated workspace
        - a fork of `kim-em/lean-eval` with changes under `generated/`
        - a repo that contains several workspaces side by side
        - a gist that contains a `lakefile.toml` and a `Submission.lean`

        The CI only reads `Submission.lean` and files under `Submission/`
        inside each matched workspace. Nothing else from your submission is
        ever inspected or published.

        If your submission is in a private repository, install the
        `lean-eval-bot` GitHub App on it so the CI can clone it. The install
        link is in the lean-eval README.

  - type: input
    id: source_url
    attributes:
      label: Submission URL
      description: |
        URL of your submission. Accepted forms include a GitHub repository
        (`https://github.com/owner/repo`), a specific commit
        (`https://github.com/owner/repo/tree/<sha>`), or a gist
        (`https://gist.github.com/user/<id>`). If the URL does not pin a
        specific commit, the CI evaluates the default branch at workflow-run
        time and records the resolved SHA in the leaderboard.
      placeholder: https://github.com/owner/my-lean-eval-proofs/tree/0000000000000000000000000000000000000000
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      description: Name or identifier of the model or system that produced this proof. Free-form; shown on the public leaderboard.
      placeholder: Claude Opus 4.6
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand that the lean-eval CI will fetch my submission URL and run comparator on every lakefile.toml whose name matches a benchmark problem id.
          required: true
        - label: I understand that only the set of solved problem IDs, along with the metadata I entered above, will be published to the public leaderboard results store.
          required: true
